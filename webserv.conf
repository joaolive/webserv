# =============================================================================
# webserv.conf
# Arquivo de configuração — baseado na seção IV.3 do subject Webserv (42)
# Inspirado no bloco 'server' do NGINX
# =============================================================================

server {

    listen      8080;
    server_name localhost;

    # Tamanho máximo do corpo da requisição do cliente
    client_max_body_size 10M;

    # Páginas de erro padrão
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;

    # ------------------------------------------------------------------
    # Root path — static website
    # ------------------------------------------------------------------
    location / {
        root          ./www/html;
        index         index.html;
        allow_methods GET POST PUT DELETE PATCH;
        autoindex     off;
    }

    # ------------------------------------------------------------------
    # Directory List enabled
    # ------------------------------------------------------------------
    location /files {
        root          ./www/html;
        allow_methods GET POST PUT DELETE PATCH;
        autoindex     on;
    }

    # ------------------------------------------------------------------
    # Upload files
    # ------------------------------------------------------------------
    location /upload {
        root              ./www/html/upload;
        allow_methods     GET POST DELETE;
        client_max_body_size 20M;
        upload_store      ./www/html/upload;
    }

    # ------------------------------------------------------------------
    # CGI — Python (.py)
    # ------------------------------------------------------------------
    location /cgi-bin {
        root          ./www/cgi-bin;
        allow_methods GET POST PUT DELETE PATCH;
        cgi_extension .py;
        cgi_path      /usr/bin/python3;
        index         index.py;
    }

    # ------------------------------------------------------------------
    # CGI — PHP (.php)
    # ------------------------------------------------------------------
    location /php {
        root          ./www/cgi-bin;
        allow_methods GET POST PUT DELETE PATCH;
        cgi_extension .php;
        cgi_path      /usr/bin/php-cgi;
        index         index.php;
    }

    # ------------------------------------------------------------------
    # HTTP Redirection
    # ------------------------------------------------------------------
    location /old-page {
        return 301 /new-page;
    }

    location /new-page {
        root          ./www/html;
        allow_methods GET;
        index         new-page.html;
    }

    # ------------------------------------------------------------------
    # Example of an alternative root directory (as in the subject: /kapouet -> /tmp/www)
    # ------------------------------------------------------------------
    location /kapouet {
        root          /tmp/www;
        allow_methods GET;
        autoindex     off;
    }
}
